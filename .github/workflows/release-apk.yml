name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Patch onnxruntime plugin (compileSdk 34)
        run: |
          PLUGIN_GRADLE="$HOME/.pub-cache/hosted/pub.dev/onnxruntime-1.4.1/android/build.gradle"
          if [ -f "$PLUGIN_GRADLE" ]; then
            sed -i 's/compileSdkVersion 33/compileSdkVersion 34/' "$PLUGIN_GRADLE"
            echo "Patched $PLUGIN_GRADLE"
          fi
        working-directory: app

      - name: flutter pub get
        run: |
          flutter pub get
          # Patch nach pub get (Cache wurde gerade angelegt)
          PLUGIN_GRADLE="$HOME/.pub-cache/hosted/pub.dev/onnxruntime-1.4.1/android/build.gradle"
          if [ -f "$PLUGIN_GRADLE" ]; then
            sed -i 's/compileSdkVersion 33/compileSdkVersion 34/' "$PLUGIN_GRADLE"
            echo "Patched $PLUGIN_GRADLE"
          fi
        working-directory: app

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (version=$VERSION)"

      - name: Build APK (release, split per ABI)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ github.run_number }}" \
            --dart-define=GITHUB_RELEASE_TOKEN="${{ secrets.GH_RELEASE_READ_TOKEN }}"
        working-directory: app

      - name: Rename APKs
        run: |
          cd app/build/app/outputs/flutter-apk
          ls -la
          for f in app-*-release.apk; do
            mv "$f" "opa-macht-auge-${{ steps.version.outputs.tag }}-${f#app-}"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            app/build/app/outputs/flutter-apk/opa-macht-auge-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
