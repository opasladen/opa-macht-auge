name: opa_macht_auge
description: "Opa macht Auge - Pokemon-Karten erkennen, katalogisieren, bewerten."
publish_to: none
version: 0.1.4+5

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Filesystem helpers
  path_provider: ^2.1.5
  path: ^1.9.0
  share_plus: ^10.1.2

  # OTA-Updates
  package_info_plus: ^8.1.2
  open_filex: ^4.5.0
  shared_preferences: ^2.3.3

  # Models / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Camera + ML
  camera: ^0.11.0+2
  image: ^4.3.0
  onnxruntime: ^1.4.1
  google_mlkit_text_recognition: ^0.13.0

  # UI utility
  cached_network_image: ^3.4.1
  intl: ^0.19.0

  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/dinov2_small.onnx
    - assets/models/dinov2_small.preprocess.json
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/opa_logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/opa_logo_adaptive.png
  remove_alpha_ios: false
